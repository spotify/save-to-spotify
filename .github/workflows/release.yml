# Required GitHub Actions secrets:
#   CERTIFICATE_BASE64         - base64-encoded Developer ID Application .p12
#   CERTIFICATE_PASSWORD       - .p12 export password
#   APPLE_API_KEY_BASE64       - base64-encoded App Store Connect API key (.p8)
#   APPLE_API_KEY_ID           - App Store Connect API Key ID
#   APPLE_API_ISSUER_ID        - App Store Connect API Issuer ID

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      JUST_VERSION: 1.49.0
      CARGO_INSTALL_ROOT: ${{ runner.temp }}/cargo-install
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'

      - name: Cache just
        id: cache-just
        uses: actions/cache@v4
        with:
          path: ${{ env.CARGO_INSTALL_ROOT }}
          key: ${{ runner.os }}-just-${{ env.JUST_VERSION }}

      - name: Add just to PATH
        run: echo "${CARGO_INSTALL_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Install just
        if: steps.cache-just.outputs.cache-hit != 'true'
        run: cargo install just --locked --version "$JUST_VERSION" --root "$CARGO_INSTALL_ROOT"

      - name: Release
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: just release "${{ github.ref_name }}"
