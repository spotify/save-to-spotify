# Required GitHub Actions secrets:
#   MACOS_KEYCHAIN            - base64-encoded .keychain-db file
#   MACOS_KEYCHAIN_PWD        - password to unlock the keychain
#   MACOS_SIGN_IDENTITY       - codesigning identity name
#   MACOS_NOTARY_KEY          - base64-encoded App Store Connect API key (.p8)
#   MACOS_NOTARY_KEY_ID       - App Store Connect API Key ID
#   MACOS_NOTARY_ISSUER_ID    - App Store Connect API Issuer ID

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      JUST_VERSION: 1.49.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Verify the tagged commit is an ancestor of main. Without this,
      # a collaborator with tag-push access could point a v* tag at an
      # arbitrary commit (e.g. on an unreviewed branch) and this workflow
      # would execute that code with access to the signing secrets.
      # Branch protection only guards branches, not tags, so this check
      # is the workflow-level defense against running unreviewed code in
      # a privileged context.
      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag does not point to a commit on main — aborting to protect secrets"
            exit 1
          fi

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"

      - name: Cache just
        id: cache-just
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-just-${{ env.JUST_VERSION }}

      - name: Add just to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install just
        if: steps.cache-just.outputs.cache-hit != 'true'
        run: cargo install just --locked --version "$JUST_VERSION"

      - name: Release
        env:
          MACOS_KEYCHAIN: ${{ secrets.MACOS_KEYCHAIN }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass ref_name via env var to prevent shell injection — ${{ }}
          # interpolation in run: blocks is evaluated before bash parses the
          # script, so a crafted tag name could break out of the quotes and
          # execute arbitrary commands with access to secrets.
          TAG_NAME: ${{ github.ref_name }}
        run: just release "$TAG_NAME"
