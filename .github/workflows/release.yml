name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache: false

      - name: Cross-compile all platforms
        run: |
          commit="$(git rev-parse --short HEAD)"
          version="$(git describe --tags --always 2>/dev/null | sed 's/^v//' || echo "dev")"
          LDFLAGS="-X github.com/spotify/save-to-spotify/cmd.commit=${commit} -X github.com/spotify/save-to-spotify/cmd.version=${version}"
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/save-to-spotify-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/save-to-spotify-darwin-amd64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/save-to-spotify-windows-amd64.exe .
          GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/save-to-spotify-windows-arm64.exe .
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/save-to-spotify-linux-amd64 .
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/save-to-spotify-linux-arm64 .

      - name: Sign and notarize macOS binaries
        env:
          MACOS_KEYCHAIN: ${{ secrets.MACOS_KEYCHAIN }}
          MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          ./scripts/sign-and-notarize.sh dist/save-to-spotify-darwin-arm64 dist/save-to-spotify-darwin-amd64

      - name: Verify macOS binaries are loadable
        run: |
          for binary in dist/save-to-spotify-darwin-arm64 dist/save-to-spotify-darwin-amd64; do
            if ! otool -l "$binary" | grep -q LC_UUID; then
              echo "::error::$binary has no LC_UUID load command; dyld on macOS 26+ refuses to launch it (see v0.1.4 incident)"
              exit 1
            fi
          done

      - name: Upload binaries for verification and packaging
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  verify:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-26, binary: save-to-spotify-darwin-arm64 }
          - { os: macos-26-intel, binary: save-to-spotify-darwin-amd64 }
          - { os: ubuntu-latest, binary: save-to-spotify-linux-amd64 }
          - { os: ubuntu-24.04-arm, binary: save-to-spotify-linux-arm64 }
          - { os: windows-latest, binary: save-to-spotify-windows-amd64.exe }
          - { os: windows-11-arm, binary: save-to-spotify-windows-arm64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Run binary on native platform
        shell: bash
        run: |
          chmod +x "dist/${{ matrix.binary }}"
          "./dist/${{ matrix.binary }}" --version

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Package binaries with agent skill
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          skills_src="$(pwd)/plugin/skills"
          cd dist
          dist_dir="$(pwd)"
          for binary in save-to-spotify-*; do
            case "$binary" in *.zip|*.sha256) continue ;; esac
            case "$binary" in *.exe) inner="save-to-spotify.exe" ;; *) inner="save-to-spotify" ;; esac

            stage="$(mktemp -d)"
            cp "$binary" "$stage/$inner"
            chmod +x "$stage/$inner"
            cp -R "$skills_src" "$stage/skills"

            base="${binary%.exe}"
            zip_name="${base}-v${version}.zip"
            (cd "$stage" && zip -qr "${dist_dir}/${zip_name}" "$inner" skills)
            rm -rf "$stage"

            echo "Packaged: dist/${zip_name}"
          done

      - name: Emit SHA256 sidecars
        run: |
          cd dist
          for zip in *.zip; do
            shasum -a 256 "$zip" > "${zip}.sha256"
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/*.zip dist/*.sha256 \
            --title "$TAG" \
            --generate-notes

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Install ClawHub CLI
        run: npm ci --prefix .github/clawhub && echo "$(pwd)/.github/clawhub/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Publish skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: ./scripts/clawhub-publish
