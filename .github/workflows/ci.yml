name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JUST_VERSION: 1.49.0
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'

      - name: Cache just
        id: cache-just
        uses: actions/cache@v4
        with:
          path: $HOME/.cargo
          key: ${{ runner.os }}-just-${{ env.JUST_VERSION }}

      - name: Add just to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install just
        if: steps.cache-just.outputs.cache-hit != 'true'
        run: cargo install just --locked --version "$JUST_VERSION"

      - name: Test
        run: just test

      - name: Build
        run: just build
